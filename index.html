<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Collisions</title>

    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex-grow: 1;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            background-color: #555;
        }

        nav ul li {
            display: inline-block;
        }

        nav ul li a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
        }

        nav ul li a:hover {
            background-color: #777;
        }

        main {
            padding: 20px;
        }

        h2 {
            color: #333;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        p {
            color: #222;
        }

        canvas {
            width: 100%;
            max-width: 800px;
            background: white;
            border: 1px solid #ccc;
            display: block;
            margin: 20px auto;
        }

        .controls {
            margin-top: 20px;
        }

        input,
        button {
            font-family: inherit;
            padding: 8px;
            font-size: 16px;
            margin: 5px;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .counter-box {
            background: #eee;
            padding: 15px;
            border-left: 4px solid #333;
            margin-bottom: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: auto;
        }

        @media only screen and (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            canvas {
                height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Pi Collisions</h1>
        </header>

        <main>

            <section id="simulation">
                <h2>Simulation</h2>

                <div class="counter-box">
                    <strong>π ≈ <span id="counter">0</span></strong>
                </div>

                <canvas id="c" width="800" height="200"></canvas>

                <div class="controls">
                    <label for="nVal">N:</label>
                    <input type="number" id="nVal" value="3" min="1" max="7">

                    <button id="startBtn">Reset & Start</button>
                </div>
            </section>

            <section id="about">
                <h2>About</h2>

                <p>
                    This simulation demonstrates how the digits of π can emerge
                    from elastic collisions between two blocks with different masses.
                </p>

                <p>
                    The number of collisions approaches the digits of π depending
                    on the selected exponent N.
                </p>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2025 Pi Collisions</p>
    </footer>

    <script type="module">
        import { Simulation } from './physics.js';

        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const counter = document.getElementById('counter');

        let sim;

        function render(count, x1, x2) {
            counter.innerText = count;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ground line
            ctx.strokeStyle = "#999";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 1);
            ctx.lineTo(canvas.width, canvas.height - 1);
            ctx.stroke();

            // small block
            ctx.fillStyle = "#444";
            ctx.fillRect(x1, canvas.height - 40, 40, 40);

            // large block
            ctx.fillStyle = "#888";
            ctx.fillRect(x2, canvas.height - 100, 100, 100);
        }

        function loop() {
            if (sim) sim.update();
            requestAnimationFrame(loop);
        }

        document.getElementById('startBtn').onclick = () => {
            const n = parseInt(document.getElementById('nVal').value);
            sim = new Simulation(n, render);
        };

        loop();
    </script>

</body>
</html>
